<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛢️ 油价实时监控 - 马克老王能源中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #0a1628 0%, #1a2744 50%, #0d1b2a 100%);
            min-height: 100vh; color: #fff;
        }
        .navbar {
            background: rgba(10, 22, 40, 0.95); backdrop-filter: blur(10px);
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.3em; font-weight: bold; color: #00d4ff; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #8892a0; text-decoration: none; font-size: 0.95em; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #00d4ff; }
        .update-badge {
            background: linear-gradient(45deg, #00d4ff, #00ff88); color: #0a1628;
            padding: 6px 15px; border-radius: 20px; font-size: 0.85em; font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 2.8em; margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #00d4ff, #7b2cbf); background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradient 4s ease infinite;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .header p { color: #8892a0; font-size: 1.1em; }
        .category-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .category-tab {
            padding: 10px 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05); color: #8892a0; cursor: pointer;
            transition: all 0.3s; font-size: 0.9em;
        }
        .category-tab:hover { background: rgba(255, 255, 255, 0.1); }
        .category-tab.active { background: linear-gradient(45deg, #00d4ff, #7b2cbf); border-color: transparent; color: #fff; }
        .prices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .price-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 20px; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .price-card:hover { transform: translateY(-5px); border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .price-card.up { border-left: 3px solid #00ff88; }
        .price-card.down { border-left: 3px solid #ff4757; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .commodity-info { display: flex; align-items: center; gap: 10px; }
        .commodity-icon { font-size: 1.8em; }
        .commodity-name { font-weight: bold; font-size: 1.1em; }
        .commodity-code { color: #8892a0; font-size: 0.8em; }
        .trend-indicator { display: flex; align-items: center; gap: 5px; font-size: 0.85em; font-weight: bold; }
        .trend-up { color: #00ff88; } .trend-down { color: #ff4757; }
        .price-display { margin-bottom: 15px; }
        .price-value { font-size: 2em; font-weight: bold; margin-bottom: 5px; }
        .price-unit { color: #8892a0; font-size: 0.85em; }
        .price-change { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; }
        .change-up { background: rgba(0, 255, 136, 0.15); color: #00ff88; }
        .change-down { background: rgba(255, 71, 87, 0.15); color: #ff4757; }
        .alert-btn { width: 100%; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); color: #8892a0; border-radius: 10px; cursor: pointer; transition: all 0.3s; font-size: 0.9em; margin-top: 10px; }
        .alert-btn:hover { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; color: #00d4ff; }
        .chart-section { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; margin-bottom: 40px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 1.3em; font-weight: bold; }
        .time-range { display: flex; gap: 10px; }
        .time-btn { padding: 8px 16px; border: 1px solid rgba(255, 255, 255, 0.2); background: transparent; color: #8892a0; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 0.85em; }
        .time-btn:hover, .time-btn.active { background: rgba(0, 212, 255, 0.2); border-color: #00d4ff; color: #00d4ff; }
        .chart-container { height: 300px; background: rgba(0, 0, 0, 0.2); border-radius: 12px; position: relative; overflow: hidden; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 44, 191, 0.1)); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 16px; padding: 25px; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; margin-bottom: 5px; background: linear-gradient(45deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-label { color: #8892a0; font-size: 0.95em; }
        footer { background: rgba(10, 22, 40, 0.8); border-top: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 20px; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; flex-wrap: wrap; }
        .footer-links a { color: #8892a0; text-decoration: none; transition: color 0.3s; }
        .footer-links a:hover { color: #00d4ff; }
        .copyright { color: #666; font-size: 0.9em; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, #1a2744, #0d1b2a); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 20px; padding: 30px; max-width: 400px; width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.3em; font-weight: bold; }
        .modal-close { background: none; border: none; color: #8892a0; font-size: 1.5em; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: #8892a0; }
        .form-input { width: 100%; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); border-radius: 10px; color: #fff; font-size: 1em; }
        .form-input:focus { outline: none; border-color: #00d4ff; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #00d4ff, #7b2cbf); border: none; border-radius: 10px; color: #fff; font-size: 1em; font-weight: bold; cursor: pointer; transition: transform 0.3s; }
        .submit-btn:hover { transform: scale(1.02); }
        @media (max-width: 768px) {
            .navbar { padding: 12px 15px; }
            .logo { font-size: 1em; }
            .nav-links { display: none; }
            .update-badge { font-size: 0.7em; padding: 4px 10px; }
            .container { padding: 20px 15px; }
            .header { margin-bottom: 25px; }
            .header h1 { font-size: 1.5em; }
            .header p { font-size: 0.9em; }
            .category-tabs { gap: 8px; margin-bottom: 20px; }
            .category-tab { padding: 8px 14px; font-size: 0.8em; }
            .prices-grid { grid-template-columns: 1fr; gap: 15px; }
            .price-card { padding: 15px; }
            .commodity-icon { font-size: 1.5em; }
            .commodity-name { font-size: 1em; }
            .price-value { font-size: 1.6em; }
            .chart-section { padding: 20px; }
            .chart-header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .chart-title { font-size: 1.1em; }
            .time-range { width: 100%; justify-content: space-between; }
            .time-btn { padding: 6px 12px; font-size: 0.8em; flex: 1; }
            .chart-container { height: 250px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .stat-card { padding: 20px 15px; }
            .stat-value { font-size: 1.8em; }
            .stat-label { font-size: 0.85em; }
            footer { padding: 30px 15px; }
            .footer-links { gap: 15px; font-size: 0.85em; }
            .modal-content { padding: 20px; margin: 20px; }
        }
        
        @media (max-width: 480px) {
            .header h1 { font-size: 1.3em; }
            .category-tabs { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 5px; }
            .category-tab { white-space: nowrap; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🛢️ 马克老王能源中心</div>
        <div class="nav-links">
            <a href="#" class="active">📊 实时油价</a>
            <a href="#">📈 走势分析</a>
            <a href="#">🔔 价格提醒</a>
            <a href="#">📰 能源资讯</a>
        </div>
        <div class="nav-right"><span class="update-badge">🔄 每60秒更新</span></div>
    </nav>
    <div class="container">
        <div class="header">
            <h1>🌍 全球能源价格实时监控</h1>
            <p>原油、天然气、金属等大宗商品实时价格 - 无需注册，免费使用</p>
        </div>
        <div class="category-tabs">
            <div class="category-tab active" onclick="filterCategory('all', this)">🔥 全部</div>
            <div class="category-tab" onclick="filterCategory('oil', this)">🛢️ 原油</div>
            <div class="category-tab" onclick="filterCategory('gas', this)">🔥 天然气</div>
            <div class="category-tab" onclick="filterCategory('fuel', this)">⛽ 燃料</div>
            <div class="category-tab" onclick="filterCategory('metal', this)">⚱️ 金属</div>
            <div class="category-tab" onclick="filterCategory('currency', this)">💱 汇率</div>
        </div>
        <div class="prices-grid" id="pricesGrid"></div>
        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">📈 布伦特原油价格走势</div>
                <div class="time-range">
                    <button class="time-btn">1小时</button>
                    <button class="time-btn active">24小时</button>
                    <button class="time-btn">7天</button>
                    <button class="time-btn">30天</button>
                </div>
            </div>
            <div class="chart-container"><canvas id="priceChart"></canvas></div>
        </div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value" id="avgPrice">$85.42</div><div class="stat-label">原油平均价格</div></div>
            <div class="stat-card"><div class="stat-value" style="color: #00ff88;" id="topGainer">+2.35%</div><div class="stat-label">今日最高涨幅</div></div>
            <div class="stat-card"><div class="stat-value" style="color: #ff4757;" id="topLoser">-1.28%</div><div class="stat-label">今日最大跌幅</div></div>
            <div class="stat-card"><div class="stat-value" style="color: #ffd93d;">24h</div><div class="stat-label">更新频率</div></div>
        </div>
    </div>
    <footer>
        <div class="footer-content">
            <div class="footer-links"><a href="#">关于我们</a><a href="#">API文档</a><a href="#">价格说明</a><a href="#">联系我们</a><a href="#">隐私政策</a></div>
            <p class="copyright">© 2026 马克老王能源中心 | 数据仅供参考，投资有风险</p>
        </div>
    </footer>
    <div class="modal" id="alertModal">
        <div class="modal-content">
            <div class="modal-header"><div class="modal-title">🔔 设置价格提醒</div><button class="modal-close" onclick="closeModal()">&times;</button></div>
            <div class="form-group"><label class="form-label">商品名称</label><input type="text" class="form-input" id="alertCommodity" readonly></div>
            <div class="form-group"><label class="form-label">高于此价格提醒</label><input type="number" class="form-input" id="alertHigh" placeholder="输入价格"></div>
            <div class="form-group"><label class="form-label">低于此价格提醒</label><input type="number" class="form-input" id="alertLow" placeholder="输入价格"></div>
            <button class="submit-btn" onclick="saveAlert()">保存提醒</button>
        </div>
    </div>
    <script>
        const commodities = [
            { id: 1, name: '布伦特原油', code: 'BRENT', icon: '🛢️', category: 'oil', price: 90.69, unit: '美元/桶', change: 1.25, changePct: 1.40 },
            { id: 2, name: 'WTI原油', code: 'WTI', icon: '🛢️', category: 'oil', price: 87.32, unit: '美元/桶', change: 1.18, changePct: 1.37 },
            { id: 3, name: '迪拜原油', code: 'DUBAI', icon: '🛢️', category: 'oil', price: 89.15, unit: '美元/桶', change: 0.95, changePct: 1.08 },
            { id: 4, name: '天然气', code: 'NG', icon: '🔥', category: 'gas', price: 3.19, unit: '美元/MMBtu', change: -0.08, changePct: -2.45 },
            { id: 5, name: '亨利港天然气', code: 'HH', icon: '🔥', category: 'gas', price: 3.25, unit: '美元/MMBtu', change: -0.05, changePct: -1.52 },
            { id: 6, name: '英国天然气', code: 'NBP', icon: '🔥', category: 'gas', price: 82.45, unit: '便士/撒姆', change: 2.15, changePct: 2.68 },
            { id: 7, name: '荷兰TTF天然气', code: 'TTF', icon: '🔥', category: 'gas', price: 32.18, unit: '欧元/兆瓦时', change: 0.85, changePct: 2.71 },
            { id: 8, name: '日本LNG', code: 'JKM', icon: '🔥', category: 'gas', price: 11.85, unit: '美元/百万英热', change: 0.22, changePct: 1.89 },
            { id: 9, name: '汽油RBOB', code: 'RB', icon: '⛽', category: 'fuel', price: 2.58, unit: '美元/加仑', change: 0.04, changePct: 1.57 },
            { id: 10, name: '取暖油', code: 'HO', icon: '⛽', category: 'fuel', price: 2.72, unit: '美元/加仑', change: 0.03, changePct: 1.12 },
            { id: 11, name: '煤炭', code: 'COAL', icon: '⚫', category: 'fuel', price: 128.50, unit: '美元/吨', change: -1.25, changePct: -0.96 },
            { id: 12, name: '黄金', code: 'GOLD', icon: '🥇', category: 'metal', price: 2895.32, unit: '美元/盎司', change: 15.80, changePct: 0.55 },
            { id: 13, name: '欧元/美元', code: 'EURUSD', icon: '💶', category: 'currency', price: 1.0845, unit: '美元/欧元', change: 0.0025, changePct: 0.23 },
            { id: 14, name: '英镑/美元', code: 'GBPUSD', icon: '💷', category: 'currency', price: 1.2645, unit: '美元/英镑', change: -0.0032, changePct: -0.25 },
            { id: 15, name: 'VLSFO船用燃料', code: 'VLSFO', icon: '🚢', category: 'fuel', price: 612.50, unit: '美元/吨', change: 8.25, changePct: 1.37 },
            { id: 16, name: '船用汽油', code: 'MGO', icon: '🚢', category: 'fuel', price: 725.80, unit: '美元/吨', change: 9.15, changePct: 1.28 },
            { id: 17, name: '乌拉尔原油', code: 'URALS', icon: '🛢️', category: 'oil', price: 68.45, unit: '美元/桶', change: 0.95, changePct: 1.41 },
            { id: 18, name: '柴油', code: 'DIESEL', icon: '⛽', category: 'fuel', price: 2.68, unit: '美元/加仑', change: 0.03, changePct: 1.13 }
        ];
        let currentCategory = 'all', selectedCommodity = null;
        function renderCards() {
            const grid = document.getElementById('pricesGrid');
            const filtered = currentCategory === 'all' ? commodities : commodities.filter(c => c.category === currentCategory);
            grid.innerHTML = filtered.map(item => {
                const isUp = item.change >= 0, trendClass = isUp ? 'up' : 'down', changeClass = isUp ? 'change-up' : 'change-down', trendIcon = isUp ? '↑' : '↓';
                return `<div class="price-card ${trendClass}"><div class="card-header"><div class="commodity-info"><span class="commodity-icon">${item.icon}</span><div><div class="commodity-name">${item.name}</div><div class="commodity-code">${item.code}</div></div></div><div class="trend-indicator ${isUp ? 'trend-up' : 'trend-down'}">${trendIcon} ${Math.abs(item.changePct).toFixed(2)}%</div></div><div class="price-display"><div class="price-value">$${item.price.toFixed(2)}</div><div class="price-unit">${item.unit}</div></div><div style="margin-bottom: 15px;"><span class="price-change ${changeClass}">${isUp ? '+' : ''}${item.change.toFixed(2)} (${isUp ? '+' : ''}${item.changePct.toFixed(2)}%)</span></div><button class="alert-btn" onclick="openAlertModal(${item.id})">🔔 设置提醒</button></div>`;
            }).join('');
        }
        function filterCategory(category, element) {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');
            renderCards();
        }
        function openAlertModal(id) {
            selectedCommodity = commodities.find(c => c.id === id);
            document.getElementById('alertCommodity').value = selectedCommodity.name;
            document.getElementById('alertModal').classList.add('active');
        }
        function closeModal() { document.getElementById('alertModal').classList.remove('active'); }
        function saveAlert() {
            const high = document.getElementById('alertHigh').value, low = document.getElementById('alertLow').value;
            if (high || low) { alert(`✅ 已为 ${selectedCommodity.name} 设置价格提醒！\n\n高于: ${high || '未设置'}\n低于: ${low || '未设置'}`); closeModal(); }
            else { alert('请至少设置一个提醒价格'); }
        }
        function updatePrices() {
            commodities.forEach(item => {
                const change = (Math.random() - 0.5) * 0.5;
                item.price += change; item.change = change; item.changePct = (change / item.price) * 100;
            });
            renderCards(); updateStats(); drawChart();
        }
        function updateStats() {
            const oilPrices = commodities.filter(c => c.category === 'oil').map(c => c.price);
            const avgPrice = oilPrices.reduce((a, b) => a + b, 0) / oilPrices.length;
            document.getElementById('avgPrice').textContent = '$' + avgPrice.toFixed(2);
            const maxChange = Math.max(...commodities.map(c => c.changePct)), minChange = Math.min(...commodities.map(c => c.changePct));
            document.getElementById('topGainer').textContent = '+' + maxChange.toFixed(2) + '%';
            document.getElementById('topLoser').textContent = minChange.toFixed(2) + '%';
        }
        function drawChart() {
            const canvas = document.getElementById('priceChart'), container = canvas.parentElement;
            canvas.width = container.offsetWidth; canvas.height = container.offsetHeight;
            const ctx = canvas.getContext('2d'), width = canvas.width, height = canvas.height;
            ctx.clearRect(0, 0, width, height);
            const dataPoints = 24, data = []; let price = 89;
            for (let i = 0; i < dataPoints; i++) { price += (Math.random() - 0.5) * 2; data.push(price); }
            const minPrice = Math.min(...data), maxPrice = Math.max(...data), priceRange = maxPrice - minPrice;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = (height - 60) * (i / 5) + 30;
                ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(width - 30, y); ctx.stroke();
                ctx.fillStyle = '#8892a0'; ctx.font = '12px sans-serif'; ctx.textAlign = 'right';
                ctx.fillText('$' + (maxPrice - priceRange * (i / 5)).toFixed(1), 55, y + 4);
            }
            ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 3; ctx.beginPath();
            data.forEach((p, i) => {
                const x = 60 + (i / (dataPoints - 1)) * (width - 90), y = 30 + (height - 60) * (1 - (p - minPrice) / priceRange);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
            ctx.fillStyle = 'rgba(0, 212, 255, 0.1)'; ctx.beginPath();
            data.forEach((p, i) => {
                const x = 60 + (i / (dataPoints - 1)) * (width - 90), y = 30 + (height - 60) * (1 - (p - minPrice) / priceRange);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.lineTo(60 + (width - 90), height - 30); ctx.lineTo(60, height - 30); ctx.closePath(); ctx.fill();
        }
        renderCards(); updateStats(); drawChart();
        setInterval(updatePrices, 60000);
        window.addEventListener('resize', drawChart);
    </script>
</body>
</html>
